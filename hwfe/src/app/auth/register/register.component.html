<div class="flex flex-col gap-4 justify-center items-center">
  <div class="text-xl text-gray-200">Create an account</div>

  <input
    class="app-input"
    style="caret-shape: block"
    autocomplete="off"
    [formField]="form.handle"
  />

  <input
    class="app-input"
    autocomplete="off"
    style="caret-shape: block"
    type="email"
    [formField]="form.email"
  />
  <input
    class="app-input"
    style="caret-shape: block"
    autocomplete="off"
    type="password"
    [formField]="form.password"
  />

  @if (form.email().pending()) {
    LOADING.........
  }

  @let err = emailError$ | async;
  @if (err) {
    {{ err | json }}
  }

  <app-button
    label="Register"
    [disabled]="form().invalid() || !form().dirty()"
    (click)="register()"
  ></app-button>

  <app-link label="Already have an account" to="/auth/login"></app-link>
</div>
