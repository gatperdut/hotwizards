<button
  class="app-button hw-border typ-button"
  [type]="type()"
  [class]="classes()"
  [disabled]="disabled()"
>
  @let icn = icon();
  @if (icn) {
    <app-icon [name]="icn" [class.icon-with-label]="label()"></app-icon>
  }

  @let lbl = label();
  @if (lbl) {
    <span>{{ lbl }}</span>
  }
</button>
