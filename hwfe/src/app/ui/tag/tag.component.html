<div
  class="flex flex-row items-center gap-hw-xsmall px-hw-small py-1 border-2 border-secondary rounded-tr-xl rounded-bl-md"
>
  <span class="typ-small">
    {{ label() }}
  </span>

  @let iconName = icon();
  @if (iconName) {
    <button
      type="button"
      (click)="callback.emit()"
      class="flex items-center justify-center hover:text-warning cursor-pointer"
    >
      <app-icon [name]="iconName" size="w-4 h-4" />
    </button>
  }
</div>
