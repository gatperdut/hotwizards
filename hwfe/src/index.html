<!doctype html>
<html lang="en" class="scrollbar-gutter-stable">
  <head>
    <meta charset="utf-8" />
    <title>Hot Wizards</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!-- SEO -->
    <meta name="description" content="Hot Wizards playing HeroQuest in your area." />

    <!-- Manifest -->
    <link rel="manifest" href="manifest.webmanifest" />

    <!-- Icons -->
    <link rel="icon" href="/pwa/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/pwa/favicon.svg" />
    <link rel="icon" type="image/png" sizes="96x96" href="/pwa/favicon-96x96.png" />
    <link rel="apple-touch-icon" href="/pwa/apple-touch-icon.png" />

    <!-- Fonts & Symbols -->
    <link
      rel="preload"
      href="/fonts/asimovian-v2-latin-ext-regular.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />

    <!-- PWA -->
    <meta name="theme-color" content="#0f172b" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  </head>

  <body style="background-color: #0f172b">
    <main>
      <app-root>
        <style>
          body {
            margin: 0;
          }

          .splash {
            display: flex;
            align-items: center;
            text-align: center;
            justify-content: center;
            height: 100vh;
            background: #0f172a;
            color: #64748b;
            font: 500 40px sans-serif;
          }
        </style>

        <span class="splash">Summoning Wizards...</span>
      </app-root>
    </main>

    <noscript>Enable JavaScript to use Hot Wizards.</noscript>
  </body>
</html>
