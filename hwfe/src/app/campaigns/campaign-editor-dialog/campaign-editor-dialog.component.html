<form [formRoot]="form">
  <app-dialog sizeClass="max-w-md">
    <ng-template appDialogTitle>
      <div class="typ-h2">{{ data.campaignId ? 'Edit campaign' : 'Create campaign' }}</div>
    </ng-template>

    <ng-template appDialogContent>
      <div class="flex flex-col gap-hw-average">
        <app-input-text
          [field]="form.name"
          label="Campaign name"
          type="text"
          autocomplete="off"
          placeholder="Maximum 40 characters"
        ></app-input-text>

        <app-checkbox [field]="form.aoo" label="Attacks of opportunity"></app-checkbox>

        <app-select
          label="Movement type"
          placeholder="Select items"
          [form]="form.movement"
          [displayFn]="movementDisplayFn"
          [options]="movements"
          class="w-[300px] max-w-[500px]"
        />
      </div>
    </ng-template>

    <ng-template appDialogActions>
      <app-button
        label="Cancel"
        type="button"
        appearance="outlined"
        (click)="dialogRef.close(false)"
      ></app-button>
      <app-button
        [label]="data.campaignId ? 'Update' : 'Create'"
        type="submit"
        [disabled]="form().invalid()"
      ></app-button>
    </ng-template>
  </app-dialog>
</form>
