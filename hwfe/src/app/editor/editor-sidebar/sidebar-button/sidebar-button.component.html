<div class="flex flex-row items-center">
  <app-button (click)="onTrigger()" [icon]="icon()" [style.anchor-name]="`--${id}`"> </app-button>

  @if (actions().length && expanded) {
    <div class="flex flex-row items-center gap-1 pl-1 anchored" [style.position-anchor]="`--${id}`">
      @for (action of actions(); track $index) {
        <app-button color="secondary" [icon]="action.icon" (click)="onAction(action)"> </app-button>
      }
    </div>
  }
</div>
