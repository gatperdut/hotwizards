<app-dialog sizeClass="max-w-md">
  <ng-template appDialogTitle>
    <div class="typ-h2">Edit adventure</div>
  </ng-template>

  <ng-template appDialogContent>
    <app-adventure-picker [actions]="adventurePickerActions"></app-adventure-picker>
  </ng-template>

  <ng-template appDialogActions>
    <app-button
      label="Cancel"
      type="button"
      appearance="outlined"
      (click)="dialogRef.close()"
    ></app-button>
  </ng-template>
</app-dialog>
