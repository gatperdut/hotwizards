<app-dialog sizeClass="max-w-md">
  <ng-template appDialogTitle>
    <div class="typ-h2">{{ data.title }}</div>
  </ng-template>

  <ng-template appDialogContent>
    <div class="flex flex-col gap-hw-average">
      <div class="typ-body">{{ data.question }}</div>
    </div>
  </ng-template>

  <ng-template appDialogActions>
    <app-button
      label="Cancel"
      type="button"
      appearance="outlined"
      (click)="dialogRef.close(false)"
    ></app-button>
    <app-button
      label="Yes"
      type="submit"
      [color]="data.color || 'primary'"
      (click)="dialogRef.close(true)"
    ></app-button>
  </ng-template>
</app-dialog>
