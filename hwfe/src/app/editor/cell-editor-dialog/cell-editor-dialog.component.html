<form [formRoot]="form">
  <app-dialog sizeClass="max-w-md">
    <ng-template appDialogTitle>
      <div class="typ-h2">Edit cell</div>
    </ng-template>

    <ng-template appDialogContent>
      <div class="flex flex-col gap-hw-xlarge">
        <div class="flex flex-col gap-hw-average">
          <div class="typ-h2">Base sprite</div>
          <app-select
            label="Base sprite path"
            placeholder="Select base sprite path"
            [form]="form.baseSpritePath"
            [displayFn]="baseSpritePathDisplayFn"
            [options]="baseSpritePaths"
          />
        </div>
        <div class="flex flex-col gap-hw-average">
          <div class="typ-h2">Feature</div>
        </div>
      </div>
    </ng-template>

    <ng-template appDialogActions>
      <app-button
        label="Cancel"
        type="button"
        appearance="outlined"
        (click)="dialogRef.close(undefined)"
      ></app-button>

      <app-button
        label="Delete"
        type="button"
        color="warning"
        (click)="dialogRef.close(null)"
      ></app-button>

      <app-button
        label="Accept"
        type="submit"
        [disabled]="form().invalid() || !form().dirty()"
      ></app-button>
    </ng-template>
  </app-dialog>
</form>
