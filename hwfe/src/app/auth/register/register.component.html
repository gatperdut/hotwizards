<div class="flex flex-col gap-4 justify-center items-center">
  <div class="text-xl text-gray-200">Create an account</div>

  <input
    class="app-input"
    style="caret-shape: block"
    autocomplete="off"
    [formField]="registerForm.handle"
  />

  <input
    class="app-input"
    autocomplete="off"
    style="caret-shape: block"
    type="email"
    [formField]="registerForm.email"
  />
  <input
    class="app-input"
    style="caret-shape: block"
    autocomplete="off"
    type="password"
    [formField]="registerForm.password"
  />

  @if (registerForm.email().pending()) {
    LOADING.........
  }

  @let err = emailError$ | async;
  @if (err) {
    {{ err | json }}
  }

  <button
    class="rounded-tr-3xl rounded-bl-lg border-4 border-amber-500 bg-amber-500 px-6 h-10 text-lg font-bold text-gray-900 transition-all hover:bg-transparent hover:text-amber-500 active:scale-95"
    (click)="register()"
  >
    Register
  </button>

  <a
    class="bg-transparent focus:outline-0 text-gray-200 text-lg underline decoration-dashed underline-offset-10 decoration-amber-500"
    routerLink="/auth/login"
  >
    Already have an account?
  </a>
</div>
