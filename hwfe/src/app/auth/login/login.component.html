<div class="flex flex-col items-stretch gap-hw-large w-full">
  <div class="typ-h1 text-center">Login</div>

  <form (ngSubmit)="login()" class="flex flex-col items-stretch gap-hw-xxsmall w-full">
    <app-input-text
      [field]="form.email"
      label="Handle or email address"
      type="text"
      autocomplete="username"
      placeholder="Identifier"
    ></app-input-text>

    <app-input-text
      [field]="form.password"
      label="Password"
      type="password"
      autocomplete="current-password"
      placeholder="Your password"
    ></app-input-text>

    <app-checkbox
      class="self-center mb-hw-small"
      [field]="form.rememberMe"
      label="Remember me for a week"
    ></app-checkbox>

    <app-button
      type="submit"
      label="Login"
      [disabled]="form().invalid() || !form().touched() || form().pending()"
      class="self-center"
    ></app-button>
  </form>

  <app-link class="self-center" label="Register instead" to="/auth/register"></app-link>
</div>
