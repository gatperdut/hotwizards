<div class="flex flex-col items-stretch gap-hw-large w-full">
  <div class="typ-h1 text-center">Create an account</div>

  <div class="flex flex-col items-stretch gap-hw-xxsmall w-full">
    <app-input-text
      [field]="form.handle"
      label="Handle"
      type="text"
      autocomplete="off"
      placeholder="Who are you?"
    ></app-input-text>

    <app-input-text
      [field]="form.email"
      label="Email"
      type="email"
      autocomplete="username"
      placeholder="Your email address"
    ></app-input-text>

    <app-input-text
      [field]="form.password"
      label="Password"
      type="password"
      autocomplete="new-password"
      placeholder="Your password"
    ></app-input-text>

    <app-input-text
      [field]="form.passwordRepeat"
      label="Confirm your password"
      type="password"
      autocomplete="new-password"
      placeholder="Your password"
    ></app-input-text>

    <app-button
      label="Register"
      [disabled]="form().invalid() || form().pending()"
      (click)="register()"
      class="self-center"
    ></app-button>
  </div>

  <app-link class="self-center" label="Already have an account?" to="/auth/login"></app-link>
</div>
