<div class="flex flex-col gap-4 justify-center items-center">
  <input
    class="app-input"
    autocomplete="off"
    style="caret-shape: block"
    type="email"
    [formField]="form.email"
  />
  <input
    class="app-input"
    style="caret-shape: block"
    autocomplete="off"
    type="password"
    [formField]="form.password"
  />

  @let err = emailError$ | async;
  @if (err) {
    {{ err | json }}
  }

  <app-button
    label="Login"
    [disabled]="form().invalid() || !form().touched()"
    (click)="login()"
  ></app-button>

  <app-link label="Register instead" to="/auth/register"></app-link>
</div>
