<div class="flex flex-col gap-4 justify-center items-center">
  <div class="text-h1">Register</div>

  <app-input-text
    [field]="form.email"
    label="Handle or email address"
    type="text"
    autocomplete="username"
    placeholder="Identifier"
  ></app-input-text>

  <app-input-text
    [field]="form.password"
    label="Password"
    type="text"
    autocomplete="current-password"
    placeholder="Your password"
  ></app-input-text>

  @let err = emailError$ | async;
  @if (err) {
    {{ err | json }}
  }

  <app-button
    label="Login"
    [disabled]="form().invalid() || !form().touched() || form().pending()"
    (click)="login()"
  ></app-button>

  <app-link label="Register instead" to="/auth/register"></app-link>
</div>
