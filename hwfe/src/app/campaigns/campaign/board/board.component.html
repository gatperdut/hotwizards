<div class="flex flex-row gap-0">
  <app-sidebar class="w-[50px] min-h-dvh"></app-sidebar>

  <div class="ml-[32px] basis-full min-h-dvh cursor-grab active:cursor-grabbing">
    <div
      appPanzoom
      class="grid w-[2500px] h-[1500px] will-change-transform [content-visibility:auto] [contain-intrinsic-size:2500px_1500px]"
      style="grid-template-columns: repeat(25, 100px); grid-template-rows: repeat(15, 100px)"
    >
      @for (tile of tiles; track $index) {
        <div class="border-[3px] border-slate-700 flex items-center justify-center">
          <span>{{ $index }} </span>
        </div>
      }
    </div>
  </div>
</div>
