<form [formRoot]="form">
  <app-dialog sizeClass="max-w-md">
    <ng-template appDialogTitle>
      <div class="typ-h2">Invite</div>
    </ng-template>

    <ng-template appDialogContent>
      <div class="flex flex-col gap-hw-average">
        <div class="typ-body">Select the users to invite to your campaign.</div>
        <app-select
          placeholder="Select users"
          [form]="form"
          [(searchField)]="searchModel"
          [options]="options()"
          [trackFn]="trackFn"
          [displayFn]="displayFn"
          [multiple]="true"
          [loading]="resource.isLoading()"
          [searchable]="true"
        />
      </div>
    </ng-template>

    <ng-template appDialogActions>
      <app-button
        label="Cancel"
        type="button"
        appearance="outlined"
        (click)="dialogRef.close(false)"
      ></app-button>
      <app-button label="Invite" type="submit" [disabled]="form().invalid()"></app-button>
    </ng-template>
  </app-dialog>
</form>
