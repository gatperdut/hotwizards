name: Build and Deploy Hot Wizards Back End

on:
  push:
    branches:
      - master
    paths:
      - "hwbe/**"
  workflow_dispatch:

jobs:
  build-and-deploy-hwbe:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hwbe

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Setup node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: "24.14.1"

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ vars.REMOTE_HOST }}
          username: ${{ vars.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "hwbe/dist/**,hwbe/package.json,hwbe/package-lock.json"
          target: "/var/www/hwbe"
          strip_components: 1

      - name: Restart pm2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ vars.REMOTE_HOST }}
          username: ${{ vars.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            cd /var/www/hwbe
            npm install --omit=dev

            # Updated name here
            pm2 restart hwbe --update-env || pm2 start dist/main.js --name hwbe
            pm2 save
