<div class="flex items-center gap-hw-small">
  <app-button
    label=">"
    [disabled]="page() <= 0"
    class="flipped-x"
    (click)="page.set(page() - 1)"
  ></app-button>

  <div class="flex flex-col items-center min-w-14">
    <span class="typ-small">Page</span>
    <div class="flex items-baseline gap-hw-xxsmall">
      @if (pages()) {
        <span class="typ-h2">{{ page() + 1 }}</span>
        <span class="typ-body">/</span>
        <span class="typ-body">{{ pages() }}</span>
      } @else {
        <span class="typ-h2">—</span>
      }
    </div>
  </div>

  <app-button
    label=">"
    [disabled]="page() >= pages() - 1"
    (click)="page.set(page() + 1)"
  ></app-button>
</div>
