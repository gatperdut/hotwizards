<app-card [title]="campaign().name" [actions]="actions()">
  <div appCardBody class="flex flex-col gap-hw-average">
    <div class="flex flex-row items-center gap-hw-small">
      <div
        class="size-10 rounded-full bg-cover bg-center"
        [style.background-image]="'url(/characters/zargon.png)'"
      ></div>

      <div class="grow">
        <div class="typ-small truncate opacity-70">Master</div>
        <div class="typ-body font-bold hw-truncate">
          {{ master().handle }}
        </div>
      </div>
    </div>

    <div class="flex flex-col xl:flex-row gap-hw-average">
      @if (activeMembers().length) {
        <ng-container
          *ngTemplateOutlet="
            listOutlet;
            context: { members: activeMembers(), title: 'Active members' }
          "
        ></ng-container>
      }

      @if (pendingMembers().length) {
        <ng-container
          *ngTemplateOutlet="
            listOutlet;
            context: { members: pendingMembers(), title: 'Pending members' }
          "
        ></ng-container>
      }

      @if (!activeMembers().length && !pendingMembers().length) {
        <span class="typ-body">No members invited yet</span>
      }
    </div>
  </div>

  <ng-template #listOutlet let-members="members" let-title="title">
    <div class="flex flex-col gap-hw-small grow">
      <span class="typ-body">{{ title }}</span>

      <div class="flex flex-row flex-wrap gap-x-hw-average gap-y-hw-small">
        @for (member of members; track member.id) {
          <div class="flex flex-row items-center gap-hw-small min-w-0">
            <div
              class="size-10 rounded-full bg-cover bg-center"
              [style.background-image]="'url(/characters/zargon.png)'"
            ></div>

            <div class="min-w-0 grow">
              <div class="typ-small truncate opacity-70">Barbarian</div>
              <div class="typ-body font-bold truncate">
                {{ member.handle }}
              </div>
            </div>
          </div>
        }
      </div>
    </div>
  </ng-template>
</app-card>
