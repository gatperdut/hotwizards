<div class="flex flex-col">
  <label [for]="id" class="typ-small">{{ label() }}</label>

  <div class="relative flex group">
    <input
      [id]="id"
      class="app-input-text typ-input w-full"
      [type]="type()"
      [formField]="field()"
      [placeholder]="placeholder()"
      [autocomplete]="autocomplete()"
      [aria-invalid]="displayError() ? 'true' : null"
      [aria-describedby]="displayError() ? `error-${id}` : null"
      (focus)="state().markAsTouched()"
    />

    <div
      class="absolute inset-y-0 right-3 flex items-center pointer-events-none"
      [class.invisible]="!state().pending()"
    >
      <div class="spinner"></div>
    </div>
  </div>

  <div role="alert" [id]="`error-${id}`" class="typ-error" [class]="{ invisible: !displayError() }">
    {{ error() ? error().message : 'Placeholder' }}
  </div>
</div>
