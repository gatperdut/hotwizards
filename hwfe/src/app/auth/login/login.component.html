<div class="flex flex-col gap-4">
  <input
    class="app-input"
    autocomplete="off"
    style="caret-shape: block"
    type="email"
    [formField]="loginForm.email"
  />
  <input
    class="app-input"
    style="caret-shape: block"
    autocomplete="off"
    type="password"
    [formField]="loginForm.password"
  />

  @let err = emailError$ | async;
  @if (err) {
    {{ err | json }}
  }

  <button (click)="login()">LOGIN</button>
</div>
