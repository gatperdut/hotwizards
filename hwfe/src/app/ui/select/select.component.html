<div class="flex flex-col relative">
  <label class="typ-small mb-hw-xxsmall">{{ label() }}</label>

  <div class="relative flex group">
    <button
      type="button"
      (click)="toggle()"
      [disabled]="field()().disabled()"
      class="app-select-trigger typ-input w-full hw-border pl-hw-small pr-10 text-left"
      [class.active]="isOpen()"
    >
      <span class="truncate">{{ displayText() }}</span>
      @if (loading()) {
        <div class="spinner absolute right-3"></div>
      }
    </button>

    @if (isOpen()) {
      <div
        class="absolute z-50 w-full top-11 bg-background hw-border border-primary shadow-2xl overflow-hidden animate-in"
      >
        @if (searchable()) {
          <div class="p-hw-small">
            <app-input-text
              [field]="searchform.term"
              placeholder="Search by name"
              [loading]="loading()"
              [hasValidation]="false"
            ></app-input-text>
          </div>
        }

        <ul class="max-h-48 overflow-y-auto py-1 custom-scrollbar">
          @for (opt of filteredOptions(); track opt.value) {
            <li
              (click)="select(opt)"
              class="px-hw-small py-2 cursor-pointer typ-body hover:bg-primary hover:text-background flex justify-between"
            >
              {{ opt.label }}
              @if (multiple() && field()().value().includes(opt.value)) {
                <span>✓</span>
              }
            </li>
          } @empty {
            <li class="px-hw-small py-2 typ-small text-off-medium italic">No results found</li>
          }
        </ul>
      </div>
    }
  </div>
</div>
