<div class="flex flex-col relative">
  <label class="typ-small mb-hw-xxsmall">{{ label() }}</label>

  <div class="relative flex group">
    <button
      type="button"
      [style.anchor-name]="`--${id}`"
      (click)="toggle()"
      [disabled]="field()().disabled()"
      class="bg-transparent cursor-pointer border-primary min-h-10 h-fit typ-input w-full hw-border pl-hw-small text-left"
    >
      <div class="flex flex-row flex-wrap gap-hw-small py-hw-small pr-9">
        @if (multiple()) {
          @for (value of field()().value(); track value) {
            <app-tag [label]="displayFn()(value)"></app-tag>
          } @empty {
            <div class="opacity-70">{{ placeholder() }}</div>
          }
        } @else {
          <div [class]="{ 'opacity-70': !field()().value() }">
            {{ field()().value() || placeholder() }}
          </div>
        }
      </div>

      <div class="absolute inset-y-0 right-5 flex items-center pointer-events-none">
        @if (loading()) {
          <div class="spinner"></div>
        } @else {
          <span>a</span>
        }
      </div>
    </button>

    @if (isOpen()) {
      <div
        [style.position-anchor]="`--${id}`"
        class="anchored fixed mt-hw-xsmall flex flex-col gap-hw-small z-1 w-full bg-background hw-border border-primary p-hw-small"
      >
        @if (searchable()) {
          <app-input-text
            [field]="form.term"
            placeholder="Search by name"
            [loading]="loading()"
            [hasValidation]="false"
          ></app-input-text>
        }

        <ul class="max-h-48 overflow-y-auto custom-scrollbar">
          @for (option of options(); track trackFn()(option)) {
            <li
              (click)="select(option)"
              class="px-hw-small py-2 cursor-pointer typ-body hover:bg-secondary hover:text-background flex justify-between"
            >
              {{ displayFn()(option) }}
              @if (multiple() && field()().value().includes(trackFn()(option))) {
                <span>✓</span>
              }
            </li>
          } @empty {
            <li class="px-hw-small py-2 typ-small text-off-medium italic">No results found</li>
          }
        </ul>
      </div>
    }
  </div>

  {{ form().value() | json }}
</div>
