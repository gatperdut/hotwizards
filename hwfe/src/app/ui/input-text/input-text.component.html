<div class="flex flex-col">
  <label [for]="id" class="app-input-text-label">{{ label() }}</label>

  <div class="relative flex items-center group">
    <input
      [id]="id"
      class="app-input-text w-full pr-12"
      [type]="type()"
      [formField]="field()"
      [placeholder]="placeholder()"
      [autocomplete]="autocomplete()"
    />

    @if (!state().pending()) {
      <div class="absolute right-4">
        <div class="app-input-text-spinner"></div>
      </div>
    }
  </div>
</div>
