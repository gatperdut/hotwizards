<app-dialog sizeClass="max-w-md" (close)="ref.close()">
  <span appDialogTitle class="typ-h2 text-warning">Invite</span>

  <span appDialogContent>
    <div class="flex flex-col gap-hw-average">
      <app-select
        placeholder="Select users"
        [form]="usersForm"
        [(searchField)]="searchModel"
        [options]="options()"
        [trackFn]="trackFn"
        [displayFn]="displayFn"
        [multiple]="true"
        [loading]="resource.isLoading()"
      />

      <!-- <app-select
        label="Known Technologies"
        placeholder="Select expertise"
        [multiple]="false"
        [field]="form.techStackField"
        [options]="techOptions"
        [trackFn]="trackFn"
        [displayFn]="displayFn"
      /> -->
      <div class="typ-body">HOLA HOLA HOLA HOLA HOLA HOLA HOLA HOLA HOLA</div>

      {{ usersForm().value() | json }}
    </div>
  </span>

  <div appDialogActions class="contents">
    <app-button label="Confirm" (click)="ref.close(true)"></app-button>
  </div>
</app-dialog>
