@if (label()) {
  <div class="typ-small mb-hw-xxsmall">{{ label() }}</div>
}

<button
  type="button"
  (click)="open()"
  [style.anchor-name]="`--${id}`"
  [disabled]="form()().disabled()"
  class="flex justify-between app-select bg-background cursor-pointer hw-border border-primary min-h-10 w-full pl-hw-small text-left disabled:border-primary/20"
>
  <div class="flex flex-row flex-wrap gap-hw-small py-hw-small pr-4 typ-input">
    @if (multiple()) {
      @for (value of form()().value(); track value) {
        <app-tag [label]="displayFn()(value)" (callback)="toggle(value)" icon="x"></app-tag>
      } @empty {
        <div class="opacity-70">{{ placeholder() }}</div>
      }
    } @else {
      <div [class]="{ 'opacity-70': !form()().value() }">
        {{ displayFn()(form()().value()) || placeholder() }}
      </div>
    }
  </div>
  <div class="flex items-center relative right-2 pointer-events-none">
    @if (loading()) {
      <div class="spinner"></div>
    } @else {
      <app-icon
        [name]="isOpen() ? 'chevron-up' : 'chevron-down'"
        class="typ-input caret"
      ></app-icon>
    }
  </div>
</button>

@if (isOpen()) {
  <div
    class="mt-hw-xsmall fixed flex flex-col gap-hw-small z-1 bg-background hw-border border-primary p-hw-small anchored"
    [style.position-anchor]="`--${id}`"
  >
    @if (searchable()) {
      <app-input-text
        [field]="searchForm"
        placeholder="Search by name"
        [loading]="false"
        [hasValidation]="false"
      ></app-input-text>
    }

    <ul class="max-h-48 overflow-y-auto custom-scrollbar">
      @for (option of options(); track trackFn()(option)) {
        <li
          (click)="toggle(option)"
          class="px-hw-small py-2 cursor-pointer typ-body hover:bg-secondary hover:text-background flex justify-between"
          [class]="{ 'bg-secondary': isSelected(option) }"
        >
          {{ displayFn()(option) }}
        </li>
      } @empty {
        <li class="typ-small italic">
          @if (loading()) {
            <div>Loading</div>
          } @else {
            <div>No results found</div>
          }
        </li>
      }
    </ul>
  </div>
}
