<div class="flex flex-col items-stretch gap-hw-large w-full">
  <div class="typ-h1 text-center">Login</div>

  <div class="flex flex-col items-stretch gap-hw-xxsmall w-full">
    <app-input-text
      [field]="form.email"
      label="Handle or email address"
      type="text"
      autocomplete="username"
      placeholder="Identifier"
    ></app-input-text>

    <app-input-text
      [field]="form.password"
      label="Password"
      type="text"
      autocomplete="current-password"
      placeholder="Your password"
    ></app-input-text>

    <app-button
      label="Login"
      [disabled]="form().invalid() || !form().touched() || form().pending()"
      (click)="login()"
      class="self-center"
    ></app-button>
  </div>

  <app-link class="self-center" label="Register instead" to="/auth/register"></app-link>
</div>
