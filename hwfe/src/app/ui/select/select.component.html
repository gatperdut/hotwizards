<div class="flex flex-col relative">
  @if (label()) {
    <div class="typ-small mb-hw-xxsmall">{{ label() }}</div>
  }

  <div class="relative flex group">
    <button
      type="button"
      [style.anchor-name]="`--${id}`"
      (click)="toggle()"
      [disabled]="form()().disabled()"
      class="app-select bg-transparent cursor-pointer border-primary min-h-10 h-fit w-full hw-border pl-hw-small text-left disabled:border-primary/20"
    >
      <div class="flex flex-row flex-wrap gap-hw-small py-hw-small pr-9 typ-input">
        @if (multiple()) {
          @for (value of form()().value(); track value) {
            <app-tag [label]="displayFn()(value)"></app-tag>
          } @empty {
            <div class="opacity-70">{{ placeholder() }}</div>
          }
        } @else {
          <div [class]="{ 'opacity-70': !form()().value() }">
            {{ form()().value() || placeholder() }}
          </div>
        }
      </div>

      <div class="absolute inset-y-0 right-5 flex items-center pointer-events-none">
        @if (loading()) {
          <div class="spinner"></div>
        } @else {
          <span class="typ-input caret">a</span>
        }
      </div>
    </button>

    @if (isOpen()) {
      <div
        [style.position-anchor]="`--${id}`"
        class="anchored fixed mt-hw-xsmall flex flex-col gap-hw-small z-1 w-full bg-background hw-border border-primary p-hw-small"
      >
        <app-input-text
          [field]="searchForm"
          placeholder="Search by name"
          [loading]="false"
          [hasValidation]="false"
        ></app-input-text>

        <ul class="max-h-48 overflow-y-auto custom-scrollbar">
          @for (option of options(); track trackFn()(option)) {
            <li
              (click)="select(option)"
              class="px-hw-small py-2 cursor-pointer typ-body hover:bg-secondary hover:text-background flex justify-between"
              [class]="{ 'bg-secondary': isSelected(option) }"
            >
              {{ displayFn()(option) }}
            </li>
          } @empty {
            <li class="typ-small italic">
              @if (loading()) {
                <div>Loading</div>
              } @else {
                <div>No results found</div>
              }
            </li>
          }
        </ul>
      </div>
    }
  </div>
</div>
